<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tumblr Media Restore - 尊享網誌備份</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glow"></div>
    <div class="container">
        <header>
            <h1>Tumblr <span class="highlight">Restore</span></h1>
            <p>輕鬆存取 Tumblr 貼文中的高品質圖片與影片</p>
        </header>

        <nav class="tabs">
            <button class="tab-btn active" data-tab="downloader">下載器</button>
            <button class="tab-btn" data-tab="history">內存庫 (已下載)</button>
            <button class="tab-btn" data-tab="settings">設定</button>
        </nav>

        <main>
            <section id="downloaderTab" class="tab-content">
                <div class="card glass">
                    <div class="input-group">
                        <input type="url" id="urlInput" placeholder="在此貼上 Tumblr 文章網址..." autocomplete="off" inputmode="url">
                        <button id="pasteBtn" class="icon-btn paste-action-btn" title="從剪貼簿貼上">📋 貼上</button>
                        <button id="fetchBtn">解析</button>
                    </div>
                    <p class="paste-hint">💡 貼上連結後將自動開始解析</p>
                    <div id="status" class="status-msg"></div>
                    <div id="tagContainer" class="tag-list hidden"></div>
                </div>

                <div id="results" class="results-container hidden">
                    <div class="results-header">
                        <h2>解析結果</h2>
                        <label class="select-all">
                            <input type="checkbox" id="selectAll"> 全選
                        </label>
                    </div>
                    <div id="mediaList" class="media-grid"></div>
                    <div class="action-bar">
                        <button id="downloadBtn" class="primary-btn">下載所選項目 (0)</button>
                    </div>
                </div>

                <div id="downloadStatus" class="download-summary hidden">
                    <h3>下載進度</h3>
                    <div id="progressList"></div>
                </div>
            </section>

            <section id="historyTab" class="tab-content hidden">
                <div class="history-header">
                    <h2>已下載檔案</h2>
                    <button id="refreshHistory" class="icon-btn secondary-btn">🔄 重新整理</button>
                </div>
                <div id="historyGrid" class="media-grid"></div>
            </section>

            <section id="settingsTab" class="tab-content hidden">
                <div class="card glass">
                    <h2>系統設定</h2>
                    <p style="color: var(--text-dim); margin-bottom: 20px;">
                        部分文章（如限制級內容）需要登入資訊方可解析。請在此貼上您的 Tumblr Cookie 字符串。
                    </p>
                    <div class="form-group">
                        <label for="cookieInput">Tumblr Cookies</label>
                        <textarea id="cookieInput" placeholder="例如: blog_auth=...; pfu=...;" rows="5"></textarea>
                    </div>
                    <button id="saveSettingsBtn" class="primary-btn">儲存設定</button>
                </div>
            </section>

            <div id="viewerModal" class="modal hidden">
                <div class="modal-content glass">
                    <div class="modal-controls">
                        <span id="viewerCounter" class="viewer-counter hidden">1 / 1</span>
                        <button id="shuffleBtn" class="icon-btn shuffle-btn" title="隨機下一張 (點擊圖片或按→)">🔀</button>
                        <button id="deleteViewerFile" class="icon-btn danger-btn" title="刪除檔案">🗑️</button>
                        <span class="close-btn">&times;</span>
                    </div>
                    <div id="viewport"></div>
                    <p class="viewer-hint">💡 點擊圖片隨機跳下一張</p>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Tumblr Restore Tool. 把回憶留在身邊。</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
